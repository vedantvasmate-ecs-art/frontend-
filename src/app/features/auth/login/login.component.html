<div class="auth-page">
  <div class="auth-container" id="login-container">
    <div class="auth-header">
      <div class="auth-logo">⚡</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your Ethara account</p>
    </div>

    <!-- Role Toggle -->
    <div class="role-toggle" id="login-role-toggle">
      <button type="button" class="role-btn" [class.active]="selectedRole === 'MEMBER'" (click)="selectedRole = 'MEMBER'">
        <span class="role-icon">👤</span> Member
      </button>
      <button type="button" class="role-btn" [class.active]="selectedRole === 'ADMIN'" (click)="selectedRole = 'ADMIN'">
        <span class="role-icon">🔑</span> Admin
      </button>
    </div>

    <div class="auth-error" *ngIf="errorMessage" id="login-error">
      <span class="error-icon">⚠️</span>
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form" id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input
            type="email"
            id="email"
            [(ngModel)]="loginData.email"
            name="email"
            placeholder="Enter your email"
            required
            [class.error]="fieldErrors['email']"
          />
        </div>
        <span class="field-error" *ngIf="fieldErrors['email']">{{ fieldErrors['email'] }}</span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="loginData.password"
            name="password"
            placeholder="Enter your password"
            required
            [class.error]="fieldErrors['password']"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()" id="toggle-password">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error" *ngIf="fieldErrors['password']">{{ fieldErrors['password'] }}</span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading" id="login-submit-btn">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="btn-loading">
          <span class="btn-spinner"></span> Signing In...
        </span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register" id="goto-register">Create one</a></p>
      <a routerLink="/" class="home-link" id="goto-home">← Back to Home</a>
    </div>
  </div>

  <div class="auth-decoration">
    <div class="decoration-circle circle-1"></div>
    <div class="decoration-circle circle-2"></div>
    <div class="decoration-circle circle-3"></div>
  </div>
</div>
